<!DOCTYPE html>
<html lang="en">
  <head>
    <base href="/tiyatro-site/" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <link rel="icon" type="image/png" href="/tiyatro-site/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      (function(){
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
      })();
    </script>
    <script type="module" crossorigin src="/tiyatro-site/assets/index-CqjJjeSY.js"></script>
    <link rel="stylesheet" crossorigin href="/tiyatro-site/assets/index-DTTQskQ-.css">

    <style>
      #sp-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: 2147483647;
        background: rgba(12, 12, 22, 0.98);
        align-items: center;
        justify-content: center;
        font-family: 'Poppins', sans-serif;
      }
      #sp-overlay.on { display: flex; }
      #sp-box {
        background: #1a1a2e;
        border: 1px solid #2d2d4e;
        border-radius: 16px;
        padding: 40px 36px;
        width: 340px;
        box-shadow: 0 25px 60px rgba(0,0,0,0.7);
      }
      #sp-box h2 { color:#e2e2f0; font-size:18px; font-weight:600; margin:0 0 6px; text-align:center; }
      #sp-sub { color:#8b8baa; font-size:13px; text-align:center; margin:0 0 26px; }
      .sp-label { display:block; color:#9090b0; font-size:11px; font-weight:600; margin-bottom:5px; letter-spacing:.6px; text-transform:uppercase; }
      .sp-inp {
        width:100%; background:#0e0e24; border:1px solid #2d2d4e; border-radius:8px;
        color:#e2e2f0; font-size:16px; padding:10px 14px; outline:none;
        box-sizing:border-box; font-family:'Poppins',sans-serif; margin-bottom:14px;
        -webkit-user-select:text; user-select:text;
      }
      .sp-inp:focus { border-color:#5c5cf5; }
      .sp-inp.err { border-color:#e05c5c; }
      #sp-errmsg { color:#e05c5c; font-size:12px; text-align:center; min-height:16px; margin-bottom:10px; }
      .sp-btn {
        width:100%; border:none; border-radius:8px; padding:11px;
        font-size:14px; font-weight:600; cursor:pointer; font-family:'Poppins',sans-serif;
        margin-bottom:10px;
      }
      #sp-login-btn { background:#5c5cf5; color:#fff; }
      #sp-login-btn:hover { background:#4a4ae0; }
      #sp-change-btn { background:transparent; color:#6868aa; border:1px solid #2d2d4e !important; border-radius:8px; padding:9px; width:100%; font-size:13px; cursor:pointer; font-family:'Poppins',sans-serif; }
      #sp-change-btn:hover { color:#9090d0; border-color:#4040aa !important; }
      #sp-change-form { display:none; margin-top:18px; border-top:1px solid #2d2d4e; padding-top:18px; }
      #sp-change-form.on { display:block; }
      #sp-change-msg { font-size:12px; text-align:center; min-height:16px; margin-bottom:8px; }
      #sp-save-btn { background:#2e7d52; color:#fff; }
      #sp-save-btn:hover { background:#246840; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <div id="sp-overlay">
      <div id="sp-box">
        <h2>🔒 Giriş Gerekli</h2>
        <p id="sp-sub"></p>

        <label class="sp-label">Şifre</label>
        <input class="sp-inp" type="password" id="sp-inp" placeholder="Şifrenizi girin" maxlength="30" autocomplete="off" />
        <div id="sp-errmsg"></div>
        <button class="sp-btn" id="sp-login-btn">Giriş Yap</button>
        <button id="sp-change-btn">Şifre Değiştir</button>

        <div id="sp-change-form">
          <label class="sp-label">Eski Şifre</label>
          <input class="sp-inp" type="password" id="sp-old" placeholder="Mevcut şifre" maxlength="30" autocomplete="off" />
          <label class="sp-label">Yeni Şifre</label>
          <input class="sp-inp" type="password" id="sp-new" placeholder="Yeni şifre" maxlength="30" autocomplete="off" />
          <label class="sp-label">Yeni Şifre Tekrar</label>
          <input class="sp-inp" type="password" id="sp-new2" placeholder="Yeni şifreyi tekrar girin" maxlength="30" autocomplete="off" />
          <div id="sp-change-msg"></div>
          <button class="sp-btn" id="sp-save-btn">Şifreyi Kaydet</button>
        </div>
      </div>
    </div>

    <script>
    (function(){
      var ROTALAR = [
        {yol:'/admin', ad:'Admin Paneli'},
        {yol:'/arsiv-oyunlar', ad:'Arşiv Oyunlar'},
        {yol:'/gorevli-olmayan', ad:'Görevli Olmayan'}
      ];
      var SK = 'tiyatro_sifre';
      var OK = 'tiyatro_erisim';
      var VARSAYILAN = '525327';

      function getSifre(){ return localStorage.getItem(SK)||VARSAYILAN; }
      function setSifre(s){ localStorage.setItem(SK,s); }

      function getErisim(ad){
        try{ return JSON.parse(sessionStorage.getItem(OK)||'{}')[ad]===true; }
        catch(e){ return false; }
      }
      function setErisim(ad){
        try{
          var o=JSON.parse(sessionStorage.getItem(OK)||'{}');
          o[ad]=true;
          sessionStorage.setItem(OK,JSON.stringify(o));
        }catch(e){}
      }

      function korunanRota(){
        var yol = location.pathname;
        for(var i=0;i<ROTALAR.length;i++){
          if(yol.indexOf(ROTALAR[i].yol)!==-1) return ROTALAR[i];
        }
        return null;
      }

      // DOM refs
      var overlay = document.getElementById('sp-overlay');
      var sub     = document.getElementById('sp-sub');
      var inp     = document.getElementById('sp-inp');
      var errmsg  = document.getElementById('sp-errmsg');
      var loginBtn= document.getElementById('sp-login-btn');
      var changeBtn=document.getElementById('sp-change-btn');
      var changeForm=document.getElementById('sp-change-form');
      var oldInp  = document.getElementById('sp-old');
      var newInp  = document.getElementById('sp-new');
      var new2Inp = document.getElementById('sp-new2');
      var changeMsg=document.getElementById('sp-change-msg');
      var saveBtn = document.getElementById('sp-save-btn');

      var acik = false;
      var mevcutRota = null;

      function ac(rota){
        if(acik) return; // AÇIKSA HİÇBİR ŞEY YAPMA
        acik = true;
        mevcutRota = rota;
        sub.textContent = rota.ad + ' sayfasına erişmek için şifre giriniz';
        inp.value=''; errmsg.textContent=''; inp.classList.remove('err');
        changeForm.classList.remove('on');
        oldInp.value=''; newInp.value=''; new2Inp.value=''; changeMsg.textContent='';
        overlay.classList.add('on');
        // pointer-events koru
        overlay.style.pointerEvents='all';
        setTimeout(function(){ inp.focus(); },100);
      }

      function kapat(){
        acik = false;
        mevcutRota = null;
        overlay.classList.remove('on');
      }

      function kontrol(){
        if(acik) return; // KESİNLİKLE overlay açıkken kontrol etme
        var r = korunanRota();
        if(r && !getErisim(r.ad)) ac(r);
      }

      // Giriş
      loginBtn.addEventListener('click', function(){
        var v = inp.value;
        if(v===getSifre()){
          if(mevcutRota) setErisim(mevcutRota.ad);
          kapat();
        } else {
          errmsg.textContent='Şifre hatalı, tekrar deneyin.';
          inp.classList.add('err');
          inp.value='';
          setTimeout(function(){ inp.focus(); },30);
        }
      });
      inp.addEventListener('keydown',function(e){
        if(e.key==='Enter') loginBtn.click();
        inp.classList.remove('err');
        errmsg.textContent='';
      });

      // Şifre değiştir toggle
      changeBtn.addEventListener('click',function(){
        changeForm.classList.toggle('on');
        if(changeForm.classList.contains('on')) setTimeout(function(){ oldInp.focus(); },30);
      });

      // Kaydet
      saveBtn.addEventListener('click',function(){
        var eski=oldInp.value, yeni=newInp.value, tekrar=new2Inp.value;
        if(eski!==getSifre()){
          changeMsg.style.color='#e05c5c';
          changeMsg.textContent='Eski şifre yanlış!';
          oldInp.classList.add('err');
          oldInp.value='';
          setTimeout(function(){ oldInp.focus(); },30);
          return;
        }
        oldInp.classList.remove('err');
        if(yeni.length<4){
          changeMsg.style.color='#e05c5c';
          changeMsg.textContent='Yeni şifre en az 4 karakter olmalı.';
          return;
        }
        if(yeni!==tekrar){
          changeMsg.style.color='#e05c5c';
          changeMsg.textContent='Yeni şifreler eşleşmiyor!';
          new2Inp.value='';
          setTimeout(function(){ new2Inp.focus(); },30);
          return;
        }
        setSifre(yeni);
        changeMsg.style.color='#4caf81';
        changeMsg.textContent='Şifre başarıyla değiştirildi!';
        oldInp.value=''; newInp.value=''; new2Inp.value='';
        setTimeout(function(){ changeForm.classList.remove('on'); changeMsg.textContent=''; },2000);
      });

      // Routing - sadece overlay KAPALI iken tetikle
      window.addEventListener('hashchange', function(){ if(!acik) kontrol(); });
      window.addEventListener('popstate', function(){ if(!acik) kontrol(); });

      var _push = history.pushState.bind(history);
      var _replace = history.replaceState.bind(history);
      history.pushState = function(){
        _push.apply(history, arguments);
        if(!acik) setTimeout(kontrol, 80);
      };
      history.replaceState = function(){
        _replace.apply(history, arguments);
        if(!acik) setTimeout(kontrol, 80);
      };

      // İlk yükleme — React yüklendikten sonra bir kez kontrol
      setTimeout(kontrol, 400);
      setTimeout(kontrol, 900);

    })();
    </script>
  </body>
</html>
